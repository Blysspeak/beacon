<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beacon</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <span class="logo-text">B E A C O N</span>
        <span class="logo-sub">Deploy Dashboard</span>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" title="Refresh">↻</button>
      </div>
    </header>

    <main>
      <div id="deploys-list" class="deploys-list">
        <div class="empty-state">
          <div class="empty-icon">⟐</div>
          <div class="empty-text">No deploys yet</div>
          <div class="empty-sub">Push some code to get started</div>
        </div>
      </div>
    </main>

    <div id="details-panel" class="details-panel hidden">
      <div class="details-header">
        <span id="details-status" class="status-badge"></span>
        <span id="details-repo" class="details-repo"></span>
        <button id="btn-close-details" class="btn-close">×</button>
      </div>
      <div class="details-body">
        <div class="detail-row">
          <span class="detail-label">Workflow</span>
          <span id="details-workflow" class="detail-value"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Branch</span>
          <span id="details-branch" class="detail-value"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Commit</span>
          <span id="details-commit" class="detail-value mono"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Time</span>
          <span id="details-time" class="detail-value"></span>
        </div>
        <div id="details-failed" class="details-failed hidden">
          <span class="detail-label">Failed Jobs</span>
          <div id="details-failed-list"></div>
        </div>
        <a id="details-url" class="details-url" href="#" target="_blank">Open in GitHub →</a>
      </div>
    </div>

    <footer>
      <div class="stats">
        <span id="stat-total" class="stat">0 deploys</span>
        <span id="stat-success" class="stat success">✓ 0</span>
        <span id="stat-failed" class="stat failed">✗ 0</span>
      </div>
      <div class="footer-right">
        <span class="auto-refresh">Auto-refresh 2s</span>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
